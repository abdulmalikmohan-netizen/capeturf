<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <!-- Drop/Leaf Shape -->
  <g transform="translate(200, 160) scale(1.3)">
    <!-- Left dark green side of drop -->
    <path d="M0,-80 C-40,-20 -60,20 -60,50 C-60,83 -33,110 0,110 C-25,110 -45,85 -45,50 C-45,20 -20,-20 0,-80 Z" fill="#0A6B4A"/>
    
    <!-- Right light green side of drop -->
    <path d="M0,-80 C20,-50 40,-20 50,10 C30,-10 0,-10 -20,10 C-10,30 10,40 30,30 C10,50 -10,60 -20,90 C0,110 30,100 45,70 C55,45 55,20 50,-10 C45,-40 25,-65 0,-80 Z" fill="#8CC63F"/>
    
    <!-- Three small leaves top right -->
    <g transform="translate(45, -45)">
      <!-- Top leaf -->
      <path d="M0,0 C-10,-15 5,-30 15,-20 C25,-10 10,5 0,0 Z" fill="#4CAF50"/>
      <!-- Middle right leaf -->
      <path d="M15,-5 C25,-10 35,0 30,10 C25,20 10,5 15,-5 Z" fill="#4CAF50" transform="scale(0.7) translate(10, 10)"/>
      <!-- Bottom right leaf -->
      <path d="M5,15 C15,10 25,20 20,30 C15,40 0,25 5,15 Z" fill="#4CAF50" transform="scale(0.6) translate(5, 20)"/>
    </g>
  </g>
  
  <!-- Text -->
  <text x="200" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="44" font-weight="800" fill="#1A5D3A" text-anchor="middle" letter-spacing="3">CAPE TURF</text>
  
  <!-- Line -->
  <line x1="110" y1="325" x2="290" y2="325" stroke="#1A5D3A" stroke-width="3" />
  
  <!-- Subtitle -->
  <text x="200" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#555555" text-anchor="middle" letter-spacing="5">TURF SOLUTIONS</text>
</svg>
